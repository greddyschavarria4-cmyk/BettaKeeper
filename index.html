<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BettaKeeper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Contenedor Principal del Juego -->
    <div id="game-container">
        <!-- Panel de Estadísticas -->
        <div class="stats-panel">
            <div class="stat-item">Monedas: <span id="cantidad-monedas">50</span></div>
            <div class="stat-item">Hambre: <span id="porcentaje-hambre">82%</span></div>
        </div>
        
        <!-- Botón de Alimentar -->
        <button id="boton-alimentar">Alimentar</button>
    </div>

    <!-- Archivo de programación de fondo -->
    <script src="script.js"></script>
</body>
</html>
